# Production stack for the Raspberry Pi 5.
# Run on the Pi with:
#   docker compose -f infra/docker-compose.prod.yml up -d --build

services:
  portfolio:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: portfolio:latest
    container_name: portfolio
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - SQLITE_PATH=/data/portfolio.db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - portfolio-data:/data
    networks:
      - portfolio-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: portfolio-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - portfolio
    networks:
      - portfolio-net

volumes:
  portfolio-data:
    driver: local

networks:
  portfolio-net:
    driver: bridge
